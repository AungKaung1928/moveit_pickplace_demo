# Smart pick-and-place demo parameters

smart_pick_place:
  ros__parameters:
    # Motion parameters
    planning_attempts: 12
    planning_time_s: 6.0
    velocity_scaling: 0.15
    acceleration_scaling: 0.15

    # Workspace bounds (panda_link0 frame, m)
    workspace_x_min: -1.2
    workspace_x_max:  1.2
    workspace_y_min: -1.2
    workspace_y_max:  1.2

workspace_validator:
  ros__parameters:
    max_reach:   0.82
    min_reach:   0.18
    max_height:  0.98
    min_height: -0.05

# Bin drop-off positions (panda_link0 frame, m)
# red   → bin_A (right side)
# green → bin_B (left side)
# blue  → bin_C (centre-right)
bins:
  red:
    x: 0.55
    y: -0.28
    z: 0.30
  green:
    x: 0.55
    y:  0.28
    z: 0.30
  blue:
    x: 0.30
    y: -0.35
    z: 0.30
  yellow:
    x: 0.30
    y:  0.35
    z: 0.30
